<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>내 주변 성당 찾기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 모바일 화면 꽉 차게 설정 */
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; }
        #loading { position: absolute; top: 10px; left: 10px; z-index: 10; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 14px; font-weight: bold;}
    </style>
</head>
<body>

<div id="loading">지도 시스템 로딩 중...</div>
<div id="map"></div>

<script>
    // 1. 카카오 지도 API를 동적으로 로드하는 함수 (HTTPS 강제 및 순서 제어)
    function loadKakaoScript() {
        var script = document.createElement('script');
        // 사용자의 API 키 적용됨
        // autoload=false 파라미터: 스크립트 로드 후 우리가 수동으로 맵을 초기화하겠다는 의미
        script.src = "https://dapi.kakao.com/v2/maps/sdk.js?appkey=e5573aee8375027888420a464d5b5890&libraries=services&autoload=false";
        
        script.onload = function() {
            // 스크립트 로드가 성공하면 실행
            kakao.maps.load(function() {
                initMap(); // 지도 그리기 시작
            });
        };

        script.onerror = function() {
            // 로드 실패 시 (도메인 불일치 등)
            alert("지도 로딩 실패!\n1. 도메인(URL)이 카카오 플랫폼에 등록되지 않았거나\n2. API 키가 잘못되었습니다.\n\n현재 주소를 카카오 개발자 사이트 'Web 플랫폼'에 등록해주세요.");
            document.getElementById('loading').innerHTML = "지도 로드 실패 (새로고침 필요)";
        };

        document.head.appendChild(script);
    }

    // 2. 실제 지도를 그리고 위치를 찾는 함수
    function initMap() {
        var mapContainer = document.getElementById('map'); 
        var loadingDiv = document.getElementById('loading');
        
        var mapOption = { 
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본좌표(서울)
            level: 5 
        };

        var map = new kakao.maps.Map(mapContainer, mapOption); 
        var ps = new kakao.maps.services.Places(); 

        // 3. 내 위치 가져오기 로직
        if (navigator.geolocation) {
            loadingDiv.innerHTML = "내 위치를 찾는 중...";
            
            navigator.geolocation.getCurrentPosition(function(position) {
                var lat = position.coords.latitude; 
                var lon = position.coords.longitude; 
                var locPosition = new kakao.maps.LatLng(lat, lon); 

                // 지도 중심 이동
                map.setCenter(locPosition);
                loadingDiv.innerHTML = "내 주변 5km 성당 검색 중...";

                // 내 위치 마커
                var marker = new kakao.maps.Marker({  
                    map: map, 
                    position: locPosition 
                }); 

                // 성당 검색 실행
                searchPlaces(locPosition);

            }, function(error) {
                // GPS 차단하거나 실패했을 때
                loadingDiv.innerHTML = "위치 정보를 가져올 수 없습니다. (권한 허용 필요)";
                console.error(error);
            });

        } else { 
            loadingDiv.innerHTML = "이 브라우저는 GPS를 지원하지 않습니다.";
        }

        // 4. 키워드 검색 및 마커 표시 함수
        function searchPlaces(locPosition) {
            var callback = function(result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    loadingDiv.style.display = 'none'; // 로딩 박스 숨김
                    for (var i=0; i<result.length; i++) {
                        displayMarker(result[i]);
                    }
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    loadingDiv.innerHTML = "반경 5km 이내에 성당이 없습니다.";
                } else {
                    loadingDiv.innerHTML = "검색 중 오류가 발생했습니다.";
                }
            };

            ps.keywordSearch('성당', callback, {
                location: locPosition,
                radius: 5000
            });
        }

        // 5. 마커 출력 및 클릭 이벤트 (수정된 버전)
    function displayMarker(place) {
        var marker = new kakao.maps.Marker({
            map: map,
            position: new kakao.maps.LatLng(place.y, place.x) 
        });

        // 마커 클릭 시 보여줄 정보창 내용 (HTML/CSS 디자인 적용)
        var content = '<div style="padding:10px; min-width:200px;">';
        
        // 1. 성당 이름
        content +=    '<div style="font-weight:bold; margin-bottom:5px; font-size:14px;">' + place.place_name + '</div>';
        
        // 2. 주소 (도로명 주소 없으면 지번 주소 사용)
        content +=    '<div style="font-size:12px; color:#555; margin-bottom:10px;">' + (place.road_address_name || place.address_name) + '</div>';
        
        // 3. 버튼 영역 (flexbox로 가로 배치)
        content +=    '<div style="display:flex; gap: 5px;">';
        
        // [미사시간 버튼] - 아직 데이터가 없으므로 알림창(alert) 띄움
        content +=      '<button onclick="alert(\'미사 시간 데이터베이스 구축 중입니다.\\n조금만 기다려주세요!\')" style="background-color:#4CAF50; color:white; border:none; padding:5px 10px; border-radius:4px; font-size:12px; cursor:pointer; flex:1;">미사시간</button>';
        
        // [홈페이지 버튼] - 카카오맵 상세페이지로 새창 이동
        content +=      '<a href="' + place.place_url + '" target="_blank" style="background-color:#f1f1f1; color:black; text-decoration:none; padding:5px 10px; border-radius:4px; font-size:12px; border:1px solid #ccc; text-align:center; flex:1;">홈페이지</a>';
        
        content +=    '</div></div>';

        // 닫기 가능한 정보창 생성
        var infowindow = new kakao.maps.InfoWindow({
            content: content,
            zIndex: 1,
            removable: true // 닫기 버튼(X) 추가
        });

        // 마커 클릭 이벤트
        kakao.maps.event.addListener(marker, 'click', function() {
            infowindow.open(map, marker);
        });
    }
    }

    // 페이지 로드 시 실행 시작
    window.onload = loadKakaoScript;

</script>
</body>
</html>
